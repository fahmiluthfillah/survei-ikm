<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survei IKM 2026 - RS Bhayangkara Bondowoso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
       
        .loading { display: none; }
        .submitting .loading { display: inline-block; }
        .submitting .btn-text { display: none; }
       
        input[type="radio"]:checked + span { 
            color: #1e40af; 
            font-weight: 700; 
        }
        .modal-active { display: flex !important; }

        /* Ring merah lebih jelas saat error */
        input:invalid:focus, 
        select:invalid:focus, 
        textarea:invalid:focus {
            --tw-ring-color: #ef4444;
            border-color: #ef4444;
        }

        /* Progress bar gradient */
        #progressBar {
            background: linear-gradient(to right, #1e40af, #3b82f6);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-12">
    <!-- Progress Bar -->
    <div class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-3xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-bold text-blue-800 uppercase tracking-widest">Progress Survei</span>
                <span id="progressText" class="text-[10px] font-bold text-blue-800">0%</span>
            </div>
            <div role="progressbar" 
                 aria-valuenow="0" 
                 aria-valuemin="0" 
                 aria-valuemax="100" 
                 aria-label="Progress survei"
                 class="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-500 ease-out"></div>
            </div>
        </div>
    </div>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-6">
            <div class="bg-blue-800 h-2 w-full"></div>
            <div class="p-6 text-center">
                <h1 class="text-xl font-extrabold text-blue-900 uppercase leading-tight">RS BHAYANGKARA BONDOWOSO</h1>
                <h3 class="text-lg font-bold text-gray-700 mt-1 uppercase">Survei Kepuasan Layanan (IKM 2026)</h3>
                <p class="text-[10px] text-gray-400 mt-3 italic border-t pt-3 uppercase tracking-widest text-center">Biddokkes Polda Jatim - Bondowoso</p>
            </div>
        </div>

        <form id="surveyForm" name="google-sheet" class="space-y-6" novalidate>
            <!-- IDENTITAS -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h4 class="text-blue-800 font-bold mb-5 border-b pb-3 flex items-center uppercase text-sm tracking-wide">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Identitas & Waktu Layanan
                </h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase ml-1">Unit Layanan <span class="text-red-500">*</span></label>
                        <input type="text" name="Unit_Layanan" placeholder="Poli Gigi / UGD / Rawat Inap" required class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-200 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase ml-1">Kabupaten/Kota <span class="text-red-500">*</span></label>
                        <input type="text" name="Kota" placeholder="Contoh: Bondowoso" required class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-200 transition-all">
                    </div>
                   
                    <div class="md:col-span-2 py-2">
                        <label class="block text-xs font-bold text-gray-700 mb-3 uppercase tracking-wider">Jam Survei <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-blue-50 transition-all border-gray-200 has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50 group">
                                <input type="radio" name="Jam_Survei" value="08.00 - 12.00" required class="w-4 h-4 text-blue-600">
                                <span class="ml-3 font-semibold text-gray-600 group-has-[:checked]:text-blue-800">08.00 - 12.00</span>
                            </label>
                            <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-blue-50 transition-all border-gray-200 has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50 group">
                                <input type="radio" name="Jam_Survei" value="13.00 - 17.00" required class="w-4 h-4 text-blue-600">
                                <span class="ml-3 font-semibold text-gray-600 group-has-[:checked]:text-blue-800">13.00 - 17.00</span>
                            </label>
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase ml-1">Jenis Kelamin <span class="text-red-500">*</span></label>
                        <select name="Jenis_Kelamin" required class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white border-gray-200 transition-all text-sm">
                            <option value="">Pilih...</option>
                            <option value="L">Laki-laki (L)</option>
                            <option value="P">Perempuan (P)</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase ml-1">Usia (Tahun) <span class="text-red-500">*</span></label>
                        <input type="number" name="Usia" placeholder="Contoh: 30" min="1" max="100" inputmode="numeric" required class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-200 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase ml-1">Pendidikan <span class="text-red-500">*</span></label>
                        <select name="Pendidikan" required class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white border-gray-200 transition-all text-sm">
                            <option value="">Pilih Pendidikan...</option>
                            <option value="SD">SD</option>
                            <option value="SMP">SMP</option>
                            <option value="SMA">SMA</option>
                            <option value="D3">D3</option>
                            <option value="S1">S1</option>
                            <option value="S2">S2</option>
                            <option value="S3">S3</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase ml-1">Pekerjaan <span class="text-red-500">*</span></label>
                        <select name="Pekerjaan" required class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white border-gray-200 transition-all text-sm">
                            <option value="">Pilih Pekerjaan...</option>
                            <option value="PNS">PNS</option>
                            <option value="TNI">TNI</option>
                            <option value="POLRI">POLRI</option>
                            <option value="SWASTA">SWASTA</option>
                            <option value="WIRAUSAHA">WIRAUSAHA</option>
                            <option value="LAINNYA">LAINNYA</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 space-y-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase ml-1 text-blue-700">Jenis Layanan yang Diterima <span class="text-red-500">*</span></label>
                        <input type="text" name="Jenis_Layanan" placeholder="Sebutkan layanan yang Anda dapatkan hari ini..." required class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-200 transition-all">
                    </div>
                </div>
            </div>

            <!-- PERTANYAAN DINAMIS -->
            <div id="questionsContainer" class="space-y-6"></div>

            <!-- KRITIK & SARAN -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex items-start mb-4">
                    <span class="bg-blue-100 text-blue-700 w-7 h-7 rounded-lg flex items-center justify-center font-bold text-sm mr-3 mt-0.5 shadow-sm">10</span>
                    <p class="text-gray-800 font-bold leading-relaxed tracking-tight text-[15px]">Kritik / Saran untuk RS Bhayangkara Bondowoso <span class="text-red-500">*</span></p>
                </div>
                <textarea name="Kritik_Saran" rows="4" placeholder="Tuliskan kritik atau saran Anda di sini..." required class="w-full px-4 py-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-100 bg-gray-50 resize-none transition-all focus:bg-white"></textarea>
            </div>

            <!-- SUBMIT -->
            <button type="submit" id="submitBtn" class="group w-full bg-blue-700 hover:bg-blue-800 text-white font-extrabold py-5 rounded-2xl shadow-xl shadow-blue-200 transition-all transform active:scale-[0.98] flex items-center justify-center">
                <span class="btn-text text-lg tracking-wider uppercase">Kirim Tanggapan Sekarang</span>
                <span class="loading animate-spin mr-3 border-4 border-white border-t-transparent rounded-full w-6 h-6"></span>
            </button>
        </form>
    </div>

    <!-- MODAL SUCCESS -->
    <div id="modalSuccess" class="fixed inset-0 bg-blue-900/40 backdrop-blur-sm hidden items-center justify-center p-4 z-[9999] transition-all">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl transform transition-all scale-110">
            <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-3xl font-black text-gray-800 mb-2 uppercase tracking-tighter">Berhasil!</h2>
            <p class="text-gray-500 mb-8 leading-relaxed px-4 text-sm font-medium">Terima kasih banyak. Masukan Anda sangat berarti bagi peningkatan kualitas layanan kami.</p>
            <button type="button" id="closeBtn" class="w-full bg-blue-800 hover:bg-blue-900 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200 transition-all active:scale-95 uppercase tracking-widest text-sm">
                Selesai
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyIQgHM21tDaENXzDAraYnVJUx84UuIj7GE7ld5TVRgykM7nUWkjWNkgcuHW6PVgZzC6A/exec';
        
        const questions = [
            { id: 1, text: "Bagaimana pendapat saudara tentang persyaratan pelayanan dengan jenis pelayanannya?", options: ["Tidak sesuai", "Kurang sesuai", "Sesuai", "Sangat sesuai"] },
            { id: 2, text: "Bagaimana pendapat saudara tentang kemudahan prosedur pelayanan di unit ini?", options: ["Tidak mudah", "Kurang mudah", "Mudah", "Sangat mudah"] },
            { id: 3, text: "Bagaimana pendapat saudara tentang kecepatan waktu dalam memberikan pelayanan?", options: ["Tidak cepat", "Kurang cepat", "Cepat", "Sangat cepat"] },
            { id: 4, text: "Bagaimana pendapat saudara tentang kewajaran biaya/tarif dalam pelayanan?", options: ["Tidak terjangkau/Mahal", "Terjangkau/Cukup", "Murah", "Gratis"] },
            { id: 5, text: "Bagaimana pendapat saudara tentang pelayanan yang diberikan?", options: ["Tidak sesuai", "Kurang sesuai", "Sesuai", "Sangat sesuai"] },
            { id: 6, text: "Bagaimana pendapat saudara tentang kemampuan petugas dalam pelayanan?", options: ["Tidak kompeten", "Kurang kompeten", "Kompeten", "Sangat kompeten"] },
            { id: 7, text: "Bagaimana pendapat saudara tentang respon petugas dalam memberikan pelayanan?", options: ["Buruk", "Cukup", "Baik", "Sangat baik"] },
            { id: 8, text: "Bagaimana pendapat saudara tentang penanganan pengaduan layanan?", options: ["Tidak ada", "Ada tetapi tidak berfungsi", "Berfungsi kurang maksimal", "Dikelola dengan baik"] },
            { id: 9, text: "Bagaimana pendapat saudara tentang kualitas sarana dan prasarana pelayanan?", options: ["Buruk", "Cukup", "Baik", "Sangat baik"] }
        ];

        const container = document.getElementById('questionsContainer');
        
        // Render pertanyaan dengan nomor skala (1-4)
        questions.forEach(q => {
            const card = document.createElement('div');
            card.className = "bg-white p-6 rounded-2xl shadow-sm border border-gray-200 transition-all relative";
            card.innerHTML = `
                <div class="flex items-start mb-5">
                    <span class="bg-blue-50 text-blue-700 w-7 h-7 rounded-lg flex items-center justify-center font-extrabold text-sm mr-3 mt-0.5 shadow-sm">${q.id}</span>
                    <p class="text-gray-800 font-bold leading-snug tracking-tight text-[15px] flex-1">${q.text} <span class="text-red-500">*</span></p>
                </div>
                <div class="grid grid-cols-1 gap-2.5">
                    ${q.options.map((opt, i) => `
                        <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-gray-50 transition-all border-gray-100 has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50 group">
                            <input type="radio" name="Q${q.id}" value="${i+1}" required class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                            <span class="ml-3 text-sm font-semibold text-gray-600 group-has-[:checked]:text-blue-800">
                                ${opt} <span class="text-xs text-gray-400 ml-2">(${i+1})</span>
                            </span>
                        </label>
                    `).join('')}
                </div>
            `;
            container.appendChild(card);
        });

        const form = document.getElementById('surveyForm');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const submitBtn = document.getElementById('submitBtn');
        const modal = document.getElementById('modalSuccess');

        // Cache elements untuk progress (lebih cepat)
        const requiredFields = form.querySelectorAll('[required]');
        const radioGroups = [...new Set(
            Array.from(requiredFields)
                 .filter(el => el.type === 'radio')
                 .map(el => el.name)
        )];

        // ==========================================
        // PROGRESS CALCULATION (dioptimasi)
        // ==========================================
        function calculateProgress() {
            let filledSteps = 0;

            // Text, number, select, textarea
            form.querySelectorAll('input[type="text"]:valid, input[type="number"]:valid, select:valid, textarea:valid').forEach(() => filledSteps++);

            // Radio groups
            radioGroups.forEach(name => {
                if (form.querySelector(`input[name="${name}"]:checked`)) filledSteps++;
            });

            const totalSteps = (requiredFields.length - form.querySelectorAll('input[type="radio"][required]').length) + radioGroups.length;
            const percentage = Math.min(100, Math.round((filledSteps / totalSteps) * 100));

            progressBar.style.width = percentage + '%';
            progressText.innerText = percentage + '%';
            progressBar.parentElement.setAttribute('aria-valuenow', percentage);
        }

        // ==========================================
        // AUTO-SAVE ke localStorage
        // ==========================================
        function saveDraft() {
            const draft = Object.fromEntries(new FormData(form));
            localStorage.setItem('surveyDraft', JSON.stringify(draft));
        }

        function loadDraft() {
            const draft = localStorage.getItem('surveyDraft');
            if (!draft) return;
            
            const data = JSON.parse(draft);
            for (const [key, value] of Object.entries(data)) {
                const field = form.querySelector(`[name="${key}"]`);
                if (field) {
                    if (field.type === 'radio') {
                        const radio = form.querySelector(`input[name="${key}"][value="${value}"]`);
                        if (radio) radio.checked = true;
                    } else {
                        field.value = value;
                    }
                }
            }
            calculateProgress();
        }

        // ==========================================
        // CUSTOM VALIDASI
        // ==========================================
        const inputs = form.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('invalid', () => input.setCustomValidity('Tidak boleh kosong'));
            input.addEventListener('input', () => input.setCustomValidity(''));
        });

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        form.addEventListener('input', () => {
            calculateProgress();
            saveDraft();
        });
        form.addEventListener('change', () => {
            calculateProgress();
            saveDraft();
        });

        // Load draft saat halaman dibuka
        window.addEventListener('load', loadDraft);

        // ==========================================
        // SUBMIT HANDLER (dengan proteksi double submit)
        // ==========================================
        let isSubmitting = false;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (isSubmitting) return;
            isSubmitting = true;
            submitBtn.classList.add('submitting');
            submitBtn.disabled = true;

            const formData = new FormData(form);
            formData.append('Timestamp', new Date().toLocaleString('id-ID'));

            try {
                const response = await fetch(scriptURL, { 
                    method: 'POST', 
                    body: formData 
                });

                if (response.ok) {
                    modal.classList.add('modal-active');
                    form.reset();
                    calculateProgress();
                    localStorage.removeItem('surveyDraft');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    throw new Error('Server error');
                }
            } catch (error) {
                alert('Gagal mengirim! Cek koneksi internet Anda dan coba lagi.');
            } finally {
                submitBtn.classList.remove('submitting');
                submitBtn.disabled = false;
                isSubmitting = false;
            }
        });

        // ==========================================
        // MODAL CLOSE (tanpa reload halaman)
        // ==========================================
        document.getElementById('closeBtn').onclick = () => {
            modal.classList.remove('modal-active');
        };

        // Inisialisasi progress
        calculateProgress();
    </script>
</body>
</html>
